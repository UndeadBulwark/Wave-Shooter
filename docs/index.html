<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WAVE SHOOTER - OPTIMIZED</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;color:#eee;cursor:none;}
#game{display:block;position:fixed;inset:0;cursor:none}
#fx{position:fixed;inset:0;pointer-events:none;z-index:2}
#ui{position:fixed;inset:0;pointer-events:none;z-index:3}
.hud-panel{position:absolute;pointer-events:none}
#hud-tl{top:16px;left:16px}
#hud-tr{top:16px;right:16px;text-align:right}
#hud-bc{bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:flex-end;gap:20px}
#hud-bl{bottom:16px;left:16px}
.hud-label{font-size:9px;color:rgba(200,200,255,0.4);text-transform:uppercase;letter-spacing:2px;font-family:'Orbitron',monospace}
.hud-value{font-family:'Orbitron',monospace;color:#ffcc44;font-size:14px}
.hud-value.blue{color:#66ccff}
.hud-value.orange{color:#ff8844}
.hud-value.red{color:#ff4455}
.hud-value.green{color:#44ff88}
.bar-container{width:200px;height:8px;background:rgba(0,0,0,0.6);border-radius:4px;overflow:hidden;border:1px solid rgba(100,100,150,0.2);margin-top:2px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.1s}
#hp-fill{background:linear-gradient(90deg,#ff2244,#ff4466);box-shadow:0 0 10px rgba(255,68,85,0.5)}
#shield-fill{background:linear-gradient(90deg,#2266ff,#66ccff);box-shadow:0 0 10px rgba(102,204,255,0.5)}
#xp-fill{background:linear-gradient(90deg,#cc8800,#ffcc44);box-shadow:0 0 8px rgba(255,204,68,0.4)}
#weapon-slots{display:flex;gap:4px}
.weapon-slot{width:32px;height:32px;background:rgba(10,10,20,0.8);border:2px solid rgba(100,100,150,0.3);border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s}
.weapon-slot.empty{opacity:0.2;border-width:1px}
.weapon-slot .ws-fill{position:absolute;inset:2px;border-radius:2px;opacity:0.8}
.weapon-slot .ws-cd{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.7);transition:height 0.05s}
.weapon-slot .ws-tier{position:absolute;top:1px;right:1px;width:6px;height:6px;border-radius:50%;box-shadow:0 0 4px currentColor}
#dash-ring{width:36px;height:36px;position:relative}
#dash-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
#dash-ring .ring-bg{fill:none;stroke:rgba(100,100,150,0.2);stroke-width:3}
#dash-ring .ring-fill{fill:none;stroke:#66ccff;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.05s;filter:drop-shadow(0 0 4px rgba(102,204,255,0.5))}
#dash-ring .dash-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(200,200,255,0.6)}
#dash-ring.ready .ring-fill{stroke:#88eeff}
#dash-ring.ready .dash-icon{color:#66ccff}
#combo-display{position:fixed;top:50%;right:40px;transform:translateY(-50%);font-family:'Orbitron',monospace;font-size:24px;color:#ffcc44;text-shadow:0 0 20px rgba(255,204,68,0.5);opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:4}
#combo-display.active{opacity:1}
#combo-display .combo-num{font-size:48px;font-weight:900;display:block;line-height:1}
#combo-display .combo-label{font-size:12px;letter-spacing:4px;color:rgba(255,204,68,0.6)}
#combo-display .combo-mult{font-size:16px;color:#ff8844;margin-top:4px}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:auto}
#menu-overlay{background:rgba(5,5,15,0.95);backdrop-filter:blur(10px)}
#menu-overlay h1{font-family:'Orbitron',monospace;font-size:64px;font-weight:900;color:#ff4455;text-shadow:0 0 40px #ff4455,0 0 80px rgba(255,68,85,0.3);letter-spacing:8px;margin-bottom:8px}
#menu-overlay .subtitle{font-size:14px;color:rgba(200,200,255,0.4);letter-spacing:4px;margin-bottom:32px}
#menu-overlay .controls{font-size:14px;color:rgba(200,200,255,0.5);margin-bottom:24px;text-align:center;line-height:2}
#menu-overlay .controls .key{color:#ffcc44;background:rgba(255,204,68,0.1);padding:2px 8px;border-radius:3px;margin:0 2px}
.btn{font-family:'Orbitron',monospace;font-size:16px;padding:14px 40px;background:linear-gradient(135deg,#ff4455,#ff6677);color:#fff;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:4px;border-radius:6px;transition:transform 0.15s,box-shadow 0.15s;pointer-events:auto}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,68,85,0.4)}
.btn.secondary{background:linear-gradient(135deg,#ff8844,#ffaa66)}
.btn.secondary:hover{box-shadow:0 8px 32px rgba(255,136,68,0.4)}
.btn.gold{background:linear-gradient(135deg,#ffcc44,#ffdd66);color:#000}
.btn.gold:hover{box-shadow:0 8px 32px rgba(255,204,68,0.4)}
.btn:disabled, .btn.disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.hidden{display:none!important}
#pause-overlay{background:rgba(5,5,15,0.9);backdrop-filter:blur(12px)}
#pause-overlay h2{font-family:'Orbitron',monospace;font-size:48px;color:#ffcc44;text-shadow:0 0 24px rgba(255,204,68,0.4);letter-spacing:8px;margin-bottom:24px}
#levelup-overlay{background:rgba(5,5,15,0.92);backdrop-filter:blur(8px)}
#levelup-title{font-family:'Orbitron',monospace;font-size:42px;color:#ffcc44;text-shadow:0 0 32px #ffcc44;letter-spacing:6px;margin-bottom:24px}
#levelup-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.upgrade-card{width:220px;padding:24px 16px;background:rgba(15,15,30,0.9);border:2px solid rgba(100,100,150,0.3);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform 0.15s,box-shadow 0.2s,border-color 0.2s;text-align:center;pointer-events:auto}
.upgrade-card:hover{transform:translateY(-4px) scale(1.02);border-color:#fff!important;}
.upgrade-card .uc-name{font-size:16px;font-weight:bold;color:#fff;font-family:'Orbitron',monospace}
.upgrade-card .uc-desc{font-size:12px;color:rgba(200,200,255,0.5);line-height:1.4}
#shop-overlay{background:rgba(5,5,15,0.95);backdrop-filter:blur(10px);padding:24px;overflow-y:auto}
#shop-title{font-family:'Orbitron',monospace;font-size:36px;color:#ff8844;text-shadow:0 0 24px rgba(255,136,68,0.4);letter-spacing:4px;margin-bottom:4px}
#shop-mats{font-family:'Orbitron',monospace;font-size:16px;color:#ff8844;margin-bottom:20px}
#shop-sections{display:flex;gap:32px;flex-wrap:wrap;justify-content:center;width:100%;max-width:1200px}
.shop-section{display:flex;flex-direction:column;align-items:center;gap:12px}
.shop-section h2{font-size:12px;color:rgba(200,200,255,0.4);font-family:'Orbitron',monospace;letter-spacing:3px;text-transform:uppercase}
#shop-grid,#sell-grid,#fuse-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.weapon-card{width:140px;padding:12px 10px;background:rgba(15,15,30,0.9);border:1px solid rgba(100,100,150,0.3);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform 0.15s,box-shadow 0.15s,border-color 0.2s;text-align:center;pointer-events:auto}
.weapon-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(255,136,68,0.15)}
.weapon-card .wc-name{font-size:11px;font-weight:bold;color:#fff;font-family:'Orbitron',monospace}
.weapon-card .wc-tier{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-family:'Orbitron',monospace}
.weapon-card .wc-stats{font-size:8px;color:rgba(200,200,255,0.4);line-height:1.4}
.weapon-card .wc-cost{font-size:12px;color:#ff8844;font-weight:bold;font-family:'Orbitron',monospace}
.weapon-card.cant-afford{opacity:0.3;pointer-events:none}
.weapon-card.sell-card{border-color:rgba(80,160,80,0.3)}
.weapon-card.sell-card:hover{border-color:#66dd66;box-shadow:0 8px 20px rgba(102,221,102,0.15)}
.weapon-card.sell-card .wc-cost{color:#66dd66}
.fuse-card{width:260px;padding:12px 14px;background:rgba(15,15,30,0.9);border:1px solid rgba(180,100,255,0.3);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:transform 0.15s,box-shadow 0.15s,border-color 0.2s;pointer-events:auto}
.fuse-card:hover{border-color:#cc88ff;transform:translateY(-2px);box-shadow:0 8px 20px rgba(180,100,255,0.2)}
.fuse-card.cant-afford{opacity:0.3;pointer-events:none}
.fuse-card .fc-inputs{display:flex;flex-direction:column;gap:2px;flex:1}
.fuse-card .fc-row{display:flex;align-items:center;gap:4px}
.fuse-card .fc-arrow{color:rgba(200,200,255,0.3);font-size:16px;text-align:center}
.fuse-card .fc-result{display:flex;align-items:center;gap:4px}
.fuse-card .fc-weapon{font-size:10px;font-family:'Orbitron',monospace;font-weight:bold}
.fuse-card .fc-tier{font-size:7px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',monospace}
.fuse-card .fc-cost{font-size:11px;color:#cc88ff;font-weight:bold;font-family:'Orbitron',monospace;white-space:nowrap}
.fuse-empty{font-size:10px;color:rgba(200,200,255,0.25);font-style:italic;padding:8px;text-align:center}
#boss-bar{position:fixed;top:60px;left:50%;transform:translateX(-50%);width:400px;max-width:80vw;z-index:4;opacity:0;transition:opacity 0.5s;pointer-events:none}
#boss-bar.active{opacity:1}
#boss-bar .boss-name{font-family:'Orbitron',monospace;font-size:14px;color:#ff4455;text-align:center;letter-spacing:4px;margin-bottom:4px;text-shadow:0 0 10px rgba(255,68,85,0.5)}
#boss-bar .boss-hp-outer{width:100%;height:12px;background:rgba(0,0,0,0.7);border-radius:6px;overflow:hidden;border:1px solid rgba(255,68,85,0.3)}
#boss-bar .boss-hp-fill{height:100%;background:linear-gradient(90deg,#ff2244,#ff4466);box-shadow:0 0 12px rgba(255,68,85,0.5);transition:width 0.1s}
#wave-announce{position:fixed;top:25%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:56px;font-weight:900;color:#ff4455;text-shadow:0 0 40px #ff4455,0 0 80px rgba(255,68,85,0.3);letter-spacing:8px;opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:5}
#wave-announce.boss{color:#ffcc44;text-shadow:0 0 40px #ffcc44,0 0 80px rgba(255,204,68,0.3)}
#mute-btn{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,10,20,0.6);border:1px solid rgba(100,100,150,0.2);color:rgba(200,200,255,0.4);cursor:pointer;font-size:14px;padding:4px 12px;border-radius:4px;transition:color 0.2s;pointer-events:auto;font-family:'Rajdhani',sans-serif}
#mute-btn:hover{color:rgba(200,200,255,0.8)}
#death-overlay{background:rgba(5,5,15,0.95);backdrop-filter:blur(10px)}
#death-overlay h1{font-family:'Orbitron',monospace;font-size:56px;color:#ff4455;text-shadow:0 0 40px #ff4455;letter-spacing:6px;margin-bottom:8px}
#death-overlay .death-stats{font-size:14px;color:rgba(200,200,255,0.5);margin-bottom:24px;text-align:center;line-height:2}
#death-overlay .death-stats span{color:#ffcc44;font-family:'Orbitron',monospace}
#damage-indicators{position:fixed;inset:0;pointer-events:none;z-index:4}
.dmg-indicator{position:absolute;width:40px;height:4px;background:linear-gradient(90deg,transparent,#ff4455);border-radius:2px;opacity:0;transition:opacity 0.1s}
#custom-crosshair{position:fixed;width:24px;height:24px;border:2px solid #44ff44;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 0 10px #44ff44;z-index:100;transition:border-color 0.1s,box-shadow 0.1s;}
#custom-crosshair::after{content:'';position:absolute;top:50%;left:50%;width:4px;height:4px;background-color:#ff4444;border-radius:50%;transform:translate(-50%,-50%);}
#custom-crosshair.locked{border-color:#ff4444;box-shadow:0 0 10px #ff4444;}
</style>
</head>
<body>
<div id="custom-crosshair"></div>
<canvas id="game"></canvas>
<canvas id="fx"></canvas>
<div id="ui">
  <div class="hud-panel" id="hud-tl">
    <div class="hud-label">HEALTH</div><div class="bar-container"><div class="bar-fill" id="hp-fill" style="width:100%"></div></div>
    <div class="hud-label" style="margin-top:6px">SHIELD</div><div class="bar-container"><div class="bar-fill" id="shield-fill" style="width:0%"></div></div>
    <div class="hud-label" style="margin-top:6px">XP</div><div class="bar-container" style="width:160px;height:4px"><div class="bar-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
  <div class="hud-panel" id="hud-tr">
    <div><span class="hud-label">WAVE </span><span class="hud-value" id="wave-num">1</span></div>
    <div><span class="hud-label">SCORE </span><span class="hud-value" id="score-num">0</span></div>
    <div><span class="hud-label">LVL </span><span class="hud-value" id="level-num">1</span></div>
    <div><span class="hud-label">MATS </span><span class="hud-value orange" id="mats-num">0</span></div>
  </div>
  <div class="hud-panel" id="hud-bc">
    <div id="dash-ring" class="ready"><svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15"/><circle class="ring-fill" cx="18" cy="18" r="15" stroke-dasharray="94.25" stroke-dashoffset="0"/></svg><div class="dash-icon">⚡</div></div>
    <div id="weapon-slots"></div>
  </div>
  <div class="hud-panel" id="hud-bl">
    <div><span class="hud-label">ARM </span><span class="hud-value" id="armor-num">0%</span></div>
    <div><span class="hud-label">DDG </span><span class="hud-value" id="dodge-num">0%</span></div>
    <div><span class="hud-label">SPD </span><span class="hud-value green" id="speed-num">100%</span></div>
  </div>
</div>
<div id="combo-display"><span class="combo-num">0</span><span class="combo-label">COMBO</span><div class="combo-mult">×1.0</div></div>
<div id="boss-bar"><div class="boss-name">BOSS</div><div class="boss-hp-outer"><div class="boss-hp-fill" style="width:100%"></div></div></div>
<div id="wave-announce"></div>
<div id="damage-indicators"></div>
<button id="mute-btn">🔊 SOUND</button>
<div class="overlay" id="menu-overlay"><h1>WAVE SHOOTER</h1><div class="subtitle">SURVIVE · UPGRADE · DOMINATE</div><div class="controls"><span class="key">WASD</span> move &nbsp; <span class="key">MOUSE</span> aim &nbsp; <span class="key">CLICK</span> fire &nbsp; <span class="key">SHIFT</span> dash &nbsp; <span class="key">ESC</span> pause</div><button class="btn" id="start-btn">START GAME</button></div>
<div class="overlay hidden" id="pause-overlay"><h2>PAUSED</h2><button class="btn gold" id="resume-btn">RESUME</button></div>
<div class="overlay hidden" id="levelup-overlay"><div id="levelup-title">LEVEL UP</div><div id="levelup-cards"></div></div>
<div class="overlay hidden" id="shop-overlay">
  <div id="shop-title">ARMORY</div>
  <div id="shop-mats">◆ <span id="shop-mat-val">0</span></div>
  <div id="shop-sections">
    <div class="shop-section"><h2>Buy</h2><div id="shop-grid"></div></div>
    <div class="shop-section"><h2>Fuse</h2><div id="fuse-grid"></div></div>
    <div class="shop-section"><h2>Sell</h2><div id="sell-grid"></div></div>
  </div>
  <button class="btn secondary" id="reroll-btn" style="margin-top:15px">REROLL SHOP</button>
  <button class="btn secondary" id="shop-next-btn" style="margin-top:10px">NEXT WAVE</button>
</div>
<div class="overlay hidden" id="death-overlay"><h1>GAME OVER</h1><div class="death-stats">Wave <span id="death-wave">1</span> · Level <span id="death-level">1</span><br>Score <span id="death-score">0</span> · Best Combo <span id="death-combo">0</span></div><button class="btn" id="retry-btn">RETRY</button></div>
<script>
(()=>{
class ObjectPool{constructor(c,m){this.items=Array.from({length:m},c);this.activeCount=0;}get(){if(this.activeCount>=this.items.length)return null;const i=this.items[this.activeCount++];i.active=true;return i;}release(i){this.items[i].active=false;this.activeCount--;if(i!==this.activeCount){const t=this.items[i];this.items[i]=this.items[this.activeCount];this.items[this.activeCount]=t;}}clear(){for(let i=0;i<this.activeCount;i++)this.items[i].active=false;this.activeCount=0;}}
const TextureManager={cache:new Map(),getGlowTexture(color,size,blur){const k=`${color}_${size}_${blur}`;if(this.cache.has(k))return this.cache.get(k);const c=document.createElement('canvas');const p=blur*2;c.width=(size+p)*2;c.height=(size+p)*2;const x=c.getContext('2d');const ce=size+p;x.shadowColor=color;x.shadowBlur=blur;x.fillStyle=color;x.beginPath();x.arc(ce,ce,size,0,Math.PI*2);x.fill();this.cache.set(k,c);return c;},drawCached(c,t,x,y,a){c.globalAlpha=a;const o=t.width/2;c.drawImage(t,x-o,y-o);}};
const gameCanvas=document.getElementById('game'),fxCanvas=document.getElementById('fx');
const gctx=gameCanvas.getContext('2d',{alpha:false}),fctx=fxCanvas.getContext('2d');
let W=0,H=0;function resize(){W=gameCanvas.width=fxCanvas.width=window.innerWidth;H=gameCanvas.height=fxCanvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const TAU=Math.PI*2,PI=Math.PI;
const rand=(a,b)=>a+Math.random()*(b-a),randInt=(a,b)=>Math.floor(rand(a,b+1)),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;},hypot=Math.hypot;
const normAngle=a=>{while(a>PI)a-=TAU;while(a<-PI)a+=TAU;return a;};
const easeOut=t=>1-Math.pow(1-t,3),easeIn=t=>t*t*t;

const AudioEngine=(()=>{
  let ctx,master,music,compressed,isMuted=false,musicNodes=[],heartbeatInterval=null;
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=0.3;compressed=ctx.createDynamicsCompressor();compressed.threshold.value=-20;compressed.ratio.value=4;compressed.connect(master);master.connect(ctx.destination);}
  function resume(){if(ctx&&ctx.state==='suspended')ctx.resume();}
  function play(type,vol=1){
    if(isMuted||!ctx)return;resume();const now=ctx.currentTime,dest=compressed;
    switch(type){
      case'fire':{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(800+rand(-50,50),now);o.frequency.exponentialRampToValueAtTime(200,now+0.08);g.gain.setValueAtTime(0.1*vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);o.connect(g);g.connect(dest);o.start(now);o.stop(now+0.08);break;}
      case'fire_heavy':{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(250+rand(-30,30),now);o.frequency.exponentialRampToValueAtTime(60,now+0.15);g.gain.setValueAtTime(0.15*vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);o.connect(g);g.connect(dest);o.start(now);o.stop(now+0.15);break;}
      case'fire_scatter':{for(let i=0;i<3;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(350+i*80+rand(-40,40),now+i*0.015);o.frequency.exponentialRampToValueAtTime(80,now+i*0.015+0.1);g.gain.setValueAtTime(0.08*vol,now+i*0.015);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.015+0.1);o.connect(g);g.connect(dest);o.start(now+i*0.015);o.stop(now+i*0.015+0.1);}break;}

function rollRarity(luck){
  let l=Math.max(0,luck)/100;
  let w=[70*(1-l*0.6), 20+10*l, 8+15*l, 1.5+10*l, 0.5+5*l];
  w=w.map(v=>Math.max(0.1,v));
  let total=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<5;i++){r-=w[i];if(r<=0)return i;}
  return 4;
}

function recalcStats(){const t=player.upgradeTotals;player.flatDmg=t.flat_dmg||0;player.damageMult=1+(t.pct_dmg||0)/100;player.flatCdReduction=t.flat_cd||0;player.fireRateMult=1-(t.pct_cd||0)/100;if(player.fireRateMult<0.1)player.fireRateMult=0.1;player.flatHpBonus=t.flat_hp||0;player.hpMult=1+(t.pct_hp||0)/100;let newMaxHp=Math.floor((100+player.flatHpBonus)*player.hpMult);if(newMaxHp>player.maxHp)player.hp+=(newMaxHp-player.maxHp);player.maxHp=newMaxHp;player.armor=t.flat_armor||0;player.maxShield=t.shield_cap||0;player.shieldRegen=t.shield_regen||0;player.shield=Math.min(player.shield,player.maxShield);player.critChance=(t.crit_chance||0)/100;player.critDmgMult=1.5+(t.crit_dmg||0)/100;player.flatProjSpeed=t.flat_proj||0;player.projSpeedMult=1+(t.pct_proj||0)/100;player.dodgeChance=Math.min(0.75,(t.dodge||0)/100);player.moveSpeedMult=1+(t.move_speed||0)/100;player.magnetMult=1+(t.magnet||0)/100;player.lifesteal=(t.lifesteal||0)/100;player.rangeMult=1+(t.range||0)/100;player.luck=t.fortune||0;}

function tryFireWeapons(){
  if(state!=='play'||isPaused)return;
  const hoverPos=getWeaponHoverPositions(player.weapons.length);
  const aim=player.aim,cosA=Math.cos(aim),sinA=Math.sin(aim);
  let firedAny=false;
  let scatterCount=0;for(const pw of player.weapons)if(pw.id==='scatter_shotgun')scatterCount++;

  const kbMult=1/scatterCount;
  for(let wi=0;wi<player.weapons.length;wi++){
    const w=player.weapons[wi];
    if(w.mechanic==='burst'&&w.burstRemaining>0)w.burstTimer-=0;
    if(w.cooldown>0)continue;
    w.cooldown=Math.max(0.05,(w.rate-player.flatCdReduction)*player.fireRateMult);
    const hp=hoverPos[wi];
    const wx=player.x+cosA*hp.vertical-sinA*hp.lateral,wy=player.y+sinA*hp.vertical+cosA*hp.lateral;
    const weaponAim=Math.atan2(player.targetY-wy,player.targetX-wx);
    const spread=w.spread,sp=(w.speed+player.flatProjSpeed)*player.projSpeedMult;
    const baseDmg=(w.dmg+player.flatDmg)*player.damageMult;
    const bulletLife=1.1*(w.rangeMult||1)*player.rangeMult;
    const totalCrit=(w.baseCrit||0)+player.critChance;
    const superCritChance=Math.max(0,totalCrit-1),normalCritChance=Math.min(1,totalCrit);
    const roll=Math.random(),isSuperCrit=roll<superCritChance,isCrit=isSuperCrit||roll<normalCritChance;
    const dmg=isSuperCrit?baseDmg*player.critDmgMult*2:isCrit?baseDmg*player.critDmgMult:baseDmg;
    const mech=w.mechanic||'normal';
    if(mech==='pierce'){
      const a=weaponAim+rand(-spread,spread);
      bullets.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:bulletLife,dmg,color:w.color,size:w.bulletSize,mechanic:'pierce',pierceHits:new Int32Array(4),pierceCount:0,tierColor:w.tierColor,tierGlow:w.tierGlow,crit:isCrit,superCrit:isSuperCrit,trail:new Float32Array(16),trailCount:0});
      spawnMuzzleParticles(wx,wy,a,w,6);AudioEngine.play('fire_heavy');
    } else if(mech==='chain'){
      const a=weaponAim+rand(-spread,spread);
      bullets.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:bulletLife,dmg,color:w.color,size:w.bulletSize,mechanic:'chain',chainRange:w.chainRange||100,chainLeft:w.chainCount||2,tierColor:w.tierColor,tierGlow:w.tierGlow,crit:isCrit,superCrit:isSuperCrit,trail:new Float32Array(16),trailCount:0});
      spawnMuzzleParticles(wx,wy,a,w,3);AudioEngine.play('fire');
    } else if(mech==='scatter'){
      const numProj=w.projectiles||6;
      for(let pi=0;pi<numProj;pi++){
        const ps=spread*2;const a=weaponAim-spread+(pi/(numProj-1))*ps+rand(-spread*0.15,spread*0.15);
        bullets.push({x:wx+Math.cos(weaponAim)*10,y:wy+Math.sin(weaponAim)*10,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:bulletLife,dmg,color:w.color,size:w.bulletSize,mechanic:'scatter',blocksProjectiles:true,knockbackEnemies:(w.knockbackEnemies||1800)*kbMult,tierColor:w.tierColor,tierGlow:w.tierGlow,crit:isCrit,superCrit:isSuperCrit,trail:new Float32Array(16),trailCount:0});
      }
      spawnMuzzleParticles(wx,wy,weaponAim,w,10);
      if(w.knockback){player.vx-=Math.cos(weaponAim)*w.knockback*kbMult;player.vy-=Math.sin(weaponAim)*w.knockback*kbMult;}
      AudioEngine.play('fire_scatter');
    } else if(mech==='burst'){
      w.burstRemaining=(w.burstCount||3)-1;w.burstTimer=0;w._burstWx=wx;w._burstWy=wy;w._burstAim=weaponAim;
      const a=weaponAim+rand(-spread,spread);
      bullets.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:bulletLife,dmg,color:w.color,size:w.bulletSize,mechanic:'burst',tierColor:w.tierColor,tierGlow:w.tierGlow,crit:isCrit,superCrit:isSuperCrit,trail:new Float32Array(16),trailCount:0});
      spawnMuzzleParticles(wx,wy,a,w,3);AudioEngine.play('fire');
    } else if(mech==='homing'){
      const a=weaponAim+rand(-spread,spread);let target=null,bestD=99999;

function tickBurstWeapons(adt){
  if(state!=='play'||isPaused)return;
  const hoverPos=getWeaponHoverPositions(player.weapons.length);

    const wx=player.x+cosA*hp.vertical-sinA*hp.lateral,wy=player.y+sinA*hp.vertical+cosA*hp.lateral;
    const bAim=Math.atan2(player.targetY-wy,player.targetX-wx);
    const spread=(w.spread||0.04),sp=(w.speed+player.flatProjSpeed)*player.projSpeedMult;

    const totalCrit=(w.baseCrit||0)+player.critChance;
    const superCritChance=Math.max(0,totalCrit-1),normalCritChance=Math.min(1,totalCrit);
    const bRoll=Math.random(),isSuperCrit=bRoll<superCritChance,isCrit=isSuperCrit||bRoll<normalCritChance;

function triggerVortexExplosion(g){

  for(let j=enemies.length-1;j>=0;j--){

      const falloff=1-d/g.radius;

      e.hp-=finalDmg;e.hitFlash=0.2;

      spawnHitParticles(e.x,e.y,e.color,8,true);
      spawnDmgNum(e.x,e.y,Math.round(finalDmg),g.crit?'#ffcc44':'#dd88ff',g.crit);
      if(e.hp<=0&&!e.dead){
        e.dead=true;e.deathAnim=1;addKill(e.score);
        spawnExplosion(e.x,e.y,e.color,1.3);
        const cm=1+Math.floor(combo/5)*0.5;

    }
  }
}

function rollShopTier(luck){
  let l_factor = Math.max(0, luck) / 100;
  // Base weights heavily skewed to low tiers. Every 100 luck shifts weight from Common/Uncommon to Rare/Epic/Legendary.
  let w_common = 70 - (40 * l_factor);       // 70% -> 30%
  let w_uncommon = 20 - (5 * l_factor);      // 20% -> 15%
  let w_rare = 8 + (15 * l_factor);          // 8% -> 23%
  let w_epic = 1.5 + (10 * l_factor);        // 1.5% -> 11.5%
  let w_legendary = 0.5 + (5 * l_factor);    // 0.5% -> 5.5%
  
  let w = [
    Math.max(0.1, w_common),
    Math.max(0.1, w_uncommon),
    Math.max(0.1, w_rare),
    Math.max(0.1, w_epic),
    Math.max(0.1, w_legendary)
  ];
  
  let total = w.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for(let i=0; i<5; i++){
    r -= w[i];
    if(r <= 0) return i;
  }
  return 4;
}

  for(let i=0;i<player.weapons.length;i++){const w=player.weapons[i];const tier=getTier(w.tierIdx);const card=document.createElement('div');card.className='weapon-card sell-card';const can=player.weapons.length>1;if(!can)card.classList.add('cant-afford');card.style.borderColor=tier.color+'44';card.innerHTML=`<div class="wc-name" style="color:${tier.color}">${w.name}</div><div class="wc-tier" style="color:${tier.color}">${tier.name}</div><div class="wc-stats">DMG:${Math.round(w.dmg)}<br>Rate:${w.rate.toFixed(2)}s</div><div class="wc-cost">+◆ ${w.sell}</div>`;if(can)card.onclick=()=>{player.materials+=w.sell;player.weapons.splice(i,1);renderShop();AudioEngine.play('ui');};sellGrid.appendChild(card);}

function update(dt){

        e.hp -= g.dps * adt;

      }
    }
    
    for(let j=0;j<enemies.length;j++){if(i===j)continue;const o=enemies[j];const ex=e.x-o.x,ey=e.y-o.y;const dd=ex*ex+ey*ey;const minD=e.r+o.r;if(dd<minD*minD&&dd>0.01){const f=(minD-Math.sqrt(dd))/minD;e.vx+=(ex/Math.sqrt(dd))*f*140;e.vy+=(ey/Math.sqrt(dd))*f*140;}}
    e.x+=e.vx*adt;e.y+=e.vy*adt;e.x=clamp(e.x,-40,W+40);e.y=clamp(e.y,-40,H+40);
    const contactable=e.ai==='melee'||e.ai==='large_melee'||e.ai==='medium_melee'||(e.ai==='charger'&&e.chargeState!=='telegraph')||e.ai==='kamikaze'||e.ai==='boss';
    if(contactable&&player.invuln<=0&&dist2(e.x,e.y,player.x,player.y)<(e.r+player.r)**2){let dmg=e.dmg;if(e.ai==='charger'&&e.chargeState==='charging')dmg*=1.5;if(e.ai==='kamikaze'){spawnExplosion(e.x,e.y,'#ff6633',1.3);const pd=hypot(player.x-e.x,player.y-e.y);if(pd<80)damagePlayer(dmg*(1-pd/80),e.x,e.y,500);e.dead=true;e.deathAnim=1;addKill(e.score);const cm=1+Math.floor(combo/5)*0.5;spawnXPOrb(e.x,e.y,Math.round(e.xpValue*cm));spawnMatOrb(e.x,e.y,Math.round(e.matValue*cm));if(Math.random()<0.12)pickups.push({x:e.x,y:e.y,r:8,type:'heal',life:12});enemies.splice(i,1);continue;}else damagePlayer(dmg,e.x,e.y,400);}}
  
  for(let i=enemyBullets.length-1;i>=0;i--){const b=enemyBullets[i];b.x+=b.vx*adt;b.y+=b.vy*adt;b.life-=adt;if(b.trailCount<4){b.trail[b.trailCount*2]=b.x;b.trail[b.trailCount*2+1]=b.y;b.trailCount++;}else{for(let k=0;k<3;k++){b.trail[k*2]=b.trail[(k+1)*2];b.trail[k*2+1]=b.trail[(k+1)*2+1];}b.trail[6]=b.x;b.trail[7]=b.y;}if(b.life<=0||b.x<-40||b.x>W+40||b.y<-40||b.y>H+40){enemyBullets.splice(i,1);continue;}if(player.invuln<=0&&dist2(b.x,b.y,player.x,player.y)<(b.r+player.r)**2){damagePlayer(b.dmg,b.x,b.y,250);spawnHitParticles(b.x,b.y,b.color,8);enemyBullets.splice(i,1);}}
  for(let i=pickups.length-1;i>=0;i--){const p=pickups[i];p.life-=adt;if(p.life<=0){pickups.splice(i,1);continue;}if(dist2(p.x,p.y,player.x,player.y)<(p.r+player.r)**2){if(p.type==='heal'){player.hp=Math.min(player.maxHp,player.hp+25);spawnHitParticles(p.x,p.y,'#44ff88',14);spawnDmgNum(p.x,p.y,'+25','#44ff88');AudioEngine.play('pickup');}pickups.splice(i,1);}}

function updateHUD(){
  const hpVal = clamp(player.hp/player.maxHp,0,1)*100+'%'; if(hud.hp.style.width !== hpVal) hud.hp.style.width = hpVal;
  const shVal = player.maxShield>0 ? clamp(player.shield/player.maxShield,0,1)*100+'%' : '0%'; if(hud.shield.style.width !== shVal) hud.shield.style.width = shVal;
  const xpVal = clamp(player.xp/player.xpToNext,0,1)*100+'%'; if(hud.xp.style.width !== xpVal) hud.xp.style.width = xpVal;
  const wv = String(wave); if(hud.wave.textContent !== wv) hud.wave.textContent = wv;
  const sc = String(score); if(hud.score.textContent !== sc) hud.score.textContent = sc;
  const lv = String(player.level); if(hud.level.textContent !== lv) hud.level.textContent = lv;
  const mt = String(player.materials); if(hud.mats.textContent !== mt) hud.mats.textContent = mt;
  const ar = Math.round(getArmorResistance(player.armor)*100)+'%'; if(hud.armor.textContent !== ar) hud.armor.textContent = ar;
  const dg = Math.round(player.dodgeChance*100)+'%'; if(hud.dodge.textContent !== dg) hud.dodge.textContent = dg;
  const sp = Math.round(player.moveSpeedMult*100)+'%'; if(hud.speed.textContent !== sp) hud.speed.textContent = sp;
  const dashReady = player.dashCd<=0;
  if(dashReady && hud.dashRing.className !== 'ready') hud.dashRing.className = 'ready';
  else if(!dashReady && player.dashTimer>0 && hud.dashRing.className !== 'active') hud.dashRing.className = 'active';
  else if(!dashReady && player.dashTimer<=0 && hud.dashRing.className !== '') hud.dashRing.className = '';
  const pct = dashReady ? 1 : 1-player.dashCd/1.4;
  const offset = (1-pct)*94.25;
  if(hud.dashFill.getAttribute('stroke-dashoffset') !== String(offset)) hud.dashFill.setAttribute('stroke-dashoffset', offset);
  hud.slots.innerHTML = '';
  for(let i=0;i<6;i++){
    const slot=document.createElement('div'); slot.className='weapon-slot'+(i>=player.weapons.length?' empty':'');
    if(i<player.weapons.length){
      const w=player.weapons[i];const tier=getTier(w.tierIdx); slot.style.borderColor=tier.color;
      if(w.tierIdx>=4)slot.style.boxShadow='0 0 8px '+tier.glow;
      const fill=document.createElement('div');fill.className='ws-fill';fill.style.background=w.color;
      const cd=document.createElement('div');cd.className='ws-cd'; const effRate=Math.max(0.05,(w.rate-player.flatCdReduction)*player.fireRateMult);
      cd.style.height=clamp(w.cooldown/effRate,0,1)*100+'%';
      const tierDot=document.createElement('div');tierDot.className='ws-tier';tierDot.style.color=tier.color;
      slot.appendChild(fill);slot.appendChild(cd);slot.appendChild(tierDot);
    }
    hud.slots.appendChild(slot);
  }
  if(combo>=5){
    if(hud.combo.className !== 'active') hud.combo.className = 'active';
    const cn = String(combo); if(hud.comboNum.textContent !== cn) hud.comboNum.textContent = cn;
    const mult = '×'+(1+Math.floor(combo/5)*0.5).toFixed(1); if(hud.comboMult.textContent !== mult) hud.comboMult.textContent = mult;
  } else { if(hud.combo.className !== '') hud.combo.className = ''; }
  if(boss&&!boss.dead){
    if(hud.bossBar.className !== 'active') hud.bossBar.className = 'active';
    if(hud.bossName.textContent !== '⚠ BOSS ⚠') hud.bossName.textContent = '⚠ BOSS ⚠';
    const bh = clamp(boss.hp/boss.maxHp,0,1)*100+'%'; if(hud.bossHp.style.width !== bh) hud.bossHp.style.width = bh;
  } else { if(hud.bossBar.className !== '') hud.bossBar.className = ''; }
}

function drawGrid(){gctx.save();gctx.strokeStyle='rgba(80,120,200,0.04)';gctx.lineWidth=1;const step=60;const pulse=0.5+Math.sin(time*0.5)*0.5;gctx.globalAlpha=0.5+pulse*0.2;for(let x=0;x<W;x+=step){gctx.beginPath();gctx.moveTo(x,0);gctx.lineTo(x,H);gctx.stroke();}for(let y=0;y<H;y+=step){gctx.beginPath();gctx.moveTo(0,y);gctx.lineTo(W,y);gctx.stroke();}gctx.restore();}

function render(){
  gctx.clearRect(0,0,W,H);gctx.fillStyle='#0a0a12';gctx.fillRect(0,0,W,H);

    grad.addColorStop(0,`rgba(15,0,30,${0.85*intensity})`);grad.addColorStop(0.5,`rgba(80,20,120,${0.4*intensity})`);grad.addColorStop(1,'rgba(187,68,255,0)');

    gctx.save();gctx.strokeStyle=`rgba(200,100,255,${0.5*intensity*pulse})`;gctx.lineWidth=2;gctx.shadowColor='#bb44ff';gctx.shadowBlur=15;
    for(let r=0;r<4;r++){const ringR=g.radius*(0.25+r*0.2)*(0.6+progress*0.6);gctx.beginPath();const aStart=time*(4+r)+r;gctx.arc(g.x,g.y,ringR,aStart,aStart+0.8);gctx.stroke();}
    if(progress>0.5){const warn=(progress-0.5)/0.5;gctx.strokeStyle=`rgba(255,200,100,${warn*pulse*0.8})`;gctx.lineWidth=3;gctx.shadowColor='#ffcc44';gctx.shadowBlur=25;gctx.beginPath();gctx.arc(g.x,g.y,g.radius*(0.8+progress*0.3),0,TAU);gctx.stroke();}
    gctx.restore();
  }
  for(const p of pickups){const pulse=0.7+Math.sin(time*4)*0.3;gctx.fillStyle='#44ff88';gctx.shadowColor='#44ff88';gctx.shadowBlur=16*pulse;gctx.beginPath();gctx.arc(p.x,p.y,p.r,0,TAU);gctx.fill();gctx.shadowBlur=0;gctx.strokeStyle='#fff';gctx.lineWidth=1.5;gctx.beginPath();gctx.moveTo(p.x-3,p.y);gctx.lineTo(p.x+3,p.y);gctx.moveTo(p.x,p.y-3);gctx.lineTo(p.x,p.y+3);gctx.stroke();}
  for(const orb of xpOrbs){gctx.save();const pulse=0.6+Math.sin(orb.pulse)*0.4;gctx.fillStyle=`rgba(255,204,68,${pulse})`;gctx.shadowColor='#ffcc44';gctx.shadowBlur=10*pulse;gctx.beginPath();gctx.arc(orb.x,orb.y,orb.r,0,TAU);gctx.fill();gctx.restore();}
  for(const orb of matOrbs){gctx.save();const pulse=0.6+Math.sin(orb.pulse)*0.4;gctx.fillStyle=`rgba(255,136,68,${pulse})`;gctx.shadowColor='#ff8844';gctx.shadowBlur=10*pulse;gctx.beginPath();gctx.arc(orb.x,orb.y,orb.r,0,TAU);gctx.fill();gctx.restore();}
  for(const ex of explosions){const alpha=ex.life/ex.maxLife;gctx.strokeStyle=ex.color;gctx.globalAlpha=alpha*0.5;gctx.lineWidth=ex.thickness*alpha;gctx.beginPath();gctx.arc(ex.x,ex.y,ex.r,0,TAU);gctx.stroke();}gctx.globalAlpha=1;
  for(let i=0;i<particlePool.activeCount;i++){const p=particlePool.items[i];const alpha=Math.max(0,p.life/p.max);const blurAmount=p.size>2?6:0;const tex=TextureManager.getGlowTexture(p.color,p.size,blurAmount);TextureManager.drawCached(gctx,tex,p.x,p.y,alpha);}gctx.globalAlpha=1;
  for(const e of enemies)drawEnemy(e);
  for(const b of enemyBullets){gctx.save();if(b.type==='sniper'){gctx.strokeStyle=b.color;gctx.shadowColor=b.color;gctx.shadowBlur=16;gctx.lineWidth=3;const ang=Math.atan2(b.vy,b.vx);gctx.translate(b.x,b.y);gctx.rotate(ang);gctx.beginPath();gctx.moveTo(-14,0);gctx.lineTo(4,0);gctx.stroke();}else{gctx.fillStyle=b.color;gctx.shadowColor=b.color;gctx.shadowBlur=10;gctx.beginPath();gctx.arc(b.x,b.y,b.r,0,TAU);gctx.fill();}gctx.restore();}
  fctx.clearRect(0,0,W,H);
  for(const b of bullets){if(b.attached)continue;const bSize=b.size||1;const mech=b.mechanic||'normal';if(b.trailCount>1){fctx.strokeStyle=b.tierColor||b.color;fctx.globalAlpha=mech==='pierce'?0.5:(mech==='aoe'||mech==='vortex')?0.4:0.3;fctx.lineWidth=bSize*(mech==='pierce'?4:(mech==='aoe'||mech==='vortex')?5:2);fctx.beginPath();fctx.moveTo(b.trail[0],b.trail[1]);for(let ti=1;ti<b.trailCount;ti++)fctx.lineTo(b.trail[ti*2],b.trail[ti*2+1]);fctx.lineTo(b.x,b.y);fctx.stroke();fctx.globalAlpha=1;}
  fctx.strokeStyle=b.tierColor||b.color; fctx.lineWidth=3*bSize;fctx.beginPath();fctx.moveTo(b.x,b.y);fctx.lineTo(b.x-b.vx*0.012*bSize,b.y-b.vy*0.012*bSize);fctx.stroke();}
  gctx.save();gctx.globalCompositeOperation='lighter';gctx.globalAlpha=0.6;gctx.drawImage(fxCanvas,0,0);gctx.globalAlpha=1;gctx.globalCompositeOperation='source-over';gctx.restore();
  for(const b of bullets){const bSize=b.size||1;const mech=b.mechanic||'normal';gctx.save();
    if(mech==='pierce'){gctx.strokeStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=14*bSize;gctx.lineWidth=4*bSize;gctx.lineCap='round';gctx.beginPath();gctx.moveTo(b.x,b.y);gctx.lineTo(b.x-b.vx*0.022*bSize,b.y-b.vy*0.022*bSize);gctx.stroke();}
    else if(mech==='chain'){gctx.fillStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=12*bSize;gctx.beginPath();gctx.arc(b.x,b.y,bSize*3.5,0,TAU);gctx.fill();}
    else if(mech==='scatter'){gctx.fillStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=8*bSize;gctx.beginPath();gctx.arc(b.x,b.y,bSize*3,0,TAU);gctx.fill();}
    else if(mech==='burst'){gctx.strokeStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=10*bSize;gctx.lineWidth=2*bSize;gctx.lineCap='round';gctx.beginPath();gctx.moveTo(b.x,b.y);gctx.lineTo(b.x-b.vx*0.018*bSize,b.y-b.vy*0.018*bSize);gctx.stroke();if(b.crit){gctx.fillStyle='#ffcc44';gctx.beginPath();gctx.arc(b.x,b.y,bSize*2,0,TAU);gctx.fill();}}
    else if(mech==='homing'){
      if(b.attached){const urgency=1-(b.attachTimer/1.0);const pulse=0.5+Math.sin(time*15+urgency*10)*0.5;const r=bSize*3.5+urgency*3;let color;if(urgency>0.7){const fade=(urgency-0.7)/0.3;color=`rgb(255,${Math.floor(100-fade*100)},${Math.floor(100-fade*100)})`;}else if(urgency>0.4)color='#ffaa44';else color=b.color;gctx.fillStyle=color;gctx.shadowColor=color;gctx.shadowBlur=15+urgency*30;gctx.beginPath();gctx.arc(b.x,b.y,r,0,TAU);gctx.fill();gctx.strokeStyle=`rgba(255,${urgency>0.5?100:200},100,${0.3+urgency*0.7*pulse})`;gctx.lineWidth=2;gctx.shadowBlur=10+urgency*20;gctx.beginPath();gctx.arc(b.x,b.y,r+3+urgency*4,0,TAU);gctx.stroke();}
      else{gctx.fillStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=18*bSize;gctx.beginPath();gctx.arc(b.x,b.y,bSize*4,0,TAU);gctx.fill();gctx.strokeStyle='rgba(255,100,200,0.5)';gctx.lineWidth=1.5;gctx.shadowBlur=0;gctx.beginPath();gctx.arc(b.x,b.y,bSize*7,0,TAU);gctx.stroke();}
    }
    else if(mech==='vortex'){const spin=b.spin||0;gctx.save();gctx.strokeStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=30*bSize;gctx.lineWidth=2;for(let k=0;k<6;k++){const a=spin*1.5+k*TAU/6;gctx.beginPath();gctx.arc(b.x,b.y,bSize*7,a,a+0.6);gctx.stroke();}gctx.shadowBlur=15;gctx.fillStyle='rgba(20,0,40,0.9)';gctx.beginPath();gctx.arc(b.x,b.y,bSize*4,0,TAU);gctx.fill();gctx.fillStyle='#ffffff';gctx.shadowColor=b.color;gctx.shadowBlur=20;gctx.beginPath();gctx.arc(b.x,b.y,bSize*2,0,TAU);gctx.fill();gctx.restore();}
    else if(mech==='aoe'){const spin=b.spin||0;gctx.fillStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=22*bSize;gctx.beginPath();gctx.arc(b.x,b.y,bSize*5,0,TAU);gctx.fill();gctx.strokeStyle=b.color;gctx.lineWidth=2;gctx.shadowBlur=8;gctx.beginPath();for(let k=0;k<4;k++){const a=spin+k*TAU/4;const r1=bSize*6,r2=bSize*9;gctx.moveTo(b.x+Math.cos(a)*r1,b.y+Math.sin(a)*r1);gctx.lineTo(b.x+Math.cos(a)*r2,b.y+Math.sin(a)*r2);}gctx.stroke();}
    else{gctx.strokeStyle=b.color;gctx.shadowColor=b.tierGlow||b.color;gctx.shadowBlur=8*bSize;gctx.lineWidth=2*bSize;gctx.beginPath();gctx.moveTo(b.x,b.y);gctx.lineTo(b.x-b.vx*0.01*bSize,b.y-b.vy*0.01*bSize);gctx.stroke();if(b.crit){gctx.fillStyle='#ffcc44';gctx.beginPath();gctx.arc(b.x,b.y,bSize*2,0,TAU);gctx.fill();}}
    gctx.restore();
  }
  if(player){
    const aim=player.aim;const hoverPos=getWeaponHoverPositions(player.weapons.length);const cosA=Math.cos(aim),sinA=Math.sin(aim);const recoilOffset=player.recoil*4;
    for(let wi=0;wi<player.weapons.length;wi++){const w=player.weapons[wi];const hp=hoverPos[wi];const wx=player.x+cosA*hp.vertical-sinA*hp.lateral-cosA*recoilOffset;const wy=player.y+sinA*hp.vertical+cosA*hp.lateral-sinA*recoilOffset;const weaponAim=(state==='play')?Math.atan2(player.targetY-wy,player.targetX-wx):aim;gctx.save();gctx.translate(wx,wy);gctx.rotate(weaponAim);gctx.fillStyle=w.color;gctx.shadowColor=w.color;gctx.shadowBlur=4;gctx.fillRect(-4,-2,10,4);gctx.fillStyle='#ccccdd';gctx.shadowBlur=0;gctx.fillRect(4,-1,3,2);gctx.fillStyle=w.tierColor;gctx.fillRect(-4,-2,10,1);gctx.restore();}
    for(const ghost of dashTrail){const a=ghost.life/ghost.max;gctx.save();gctx.globalAlpha=a*0.55;gctx.translate(ghost.x,ghost.y);gctx.rotate(ghost.aim);gctx.fillStyle='#44eeff';gctx.shadowColor='#44eeff';gctx.shadowBlur=14*a;gctx.beginPath();gctx.moveTo(ghost.r+3,0);gctx.lineTo(ghost.r*0.3,ghost.r);gctx.lineTo(-ghost.r,ghost.r*0.6);gctx.lineTo(-ghost.r,-ghost.r*0.6);gctx.lineTo(ghost.r*0.3,-ghost.r);gctx.closePath();gctx.fill();gctx.restore();}
    gctx.save();gctx.translate(player.x,player.y);const isDashInvuln=player.dashTimer>0;const blink=player.invuln>0&&!isDashInvuln&&Math.floor(player.invuln*20)%2===0;const flashWhite=player.hitFlash>0;
    if(player.maxShield>0){const sa=0.1+Math.sin(player.shieldPhase)*0.03;const sr=player.r+6+Math.sin(player.shieldPhase*1.5)*1.5;const sp=player.shield/player.maxShield;gctx.strokeStyle=`rgba(100,200,255,${sa*sp+0.03})`;gctx.lineWidth=1.5;gctx.beginPath();gctx.arc(0,0,sr,0,TAU);gctx.stroke();}
    if(!blink){
      gctx.rotate(aim);const spd=hypot(player.vx,player.vy);const ti=clamp(spd/(player.speed*player.moveSpeedMult),0,1);
      if(ti>0.1||player.dashTimer>0){const tl=6+ti*10+(player.dashTimer>0?14:0);const tf=Math.sin(player.thrusterPhase)*0.3+0.7;gctx.fillStyle=player.dashTimer>0?`rgba(0,220,255,${0.8*tf})`:`rgba(100,150,255,${0.5*tf})`;gctx.shadowColor=player.dashTimer>0?'#00eeff':'#6699ff';gctx.shadowBlur=player.dashTimer>0?20:10;gctx.beginPath();gctx.moveTo(-player.r,0);gctx.lineTo(-player.r-tl,-2);gctx.lineTo(-player.r-tl*0.6,0);gctx.lineTo(-player.r-tl,2);gctx.closePath();gctx.fill();}
      gctx.fillStyle=flashWhite?'#ffffff':isDashInvuln?'#00ddff':'#4488cc';gctx.shadowColor=isDashInvuln?'#00eeff':'#66ccff';gctx.shadowBlur=isDashInvuln?24:12;gctx.beginPath();gctx.moveTo(player.r+3-recoilOffset,0);gctx.lineTo(player.r*0.3,player.r);gctx.lineTo(-player.r,player.r*0.6);gctx.lineTo(-player.r,-player.r*0.6);gctx.lineTo(player.r*0.3,-player.r);gctx.closePath();gctx.fill();
      gctx.fillStyle=flashWhite?'#ffffff':'#aaddff';gctx.shadowColor='#aaddff';gctx.shadowBlur=8;gctx.beginPath();gctx.arc(player.r*0.1,0,player.r*0.3,0,TAU);gctx.fill();
    }
    gctx.restore();
  }
  for(let i=0;i<dmgNumPool.activeCount;i++){const dn=dmgNumPool.items[i];gctx.save();gctx.globalAlpha=Math.max(0,dn.life);gctx.fillStyle=dn.color;gctx.font=`bold ${dn.size}px Rajdhani,sans-serif`;gctx.textAlign='center';if(dn.crit){gctx.shadowColor=dn.color;gctx.shadowBlur=10;}gctx.fillText(dn.text,dn.x,dn.y);gctx.restore();}
  gctx.restore();
  if(screenFlash>0){gctx.fillStyle=`rgba(255,255,255,${screenFlash})`;gctx.fillRect(0,0,W,H);}
  if(chromatic>0.05){gctx.save();gctx.globalCompositeOperation='screen';gctx.globalAlpha=chromatic*0.3;gctx.drawImage(gameCanvas,chromatic*3,0);gctx.drawImage(gameCanvas,-chromatic*3,0);gctx.globalAlpha=1;gctx.globalCompositeOperation='source-over';gctx.restore();}
  for(const di of dmgIndicators){const alpha=di.life/di.maxLife;const dist=60;const ix=player.x+Math.cos(di.angle)*dist;const iy=player.y+Math.sin(di.angle)*dist;gctx.save();gctx.translate(ix,iy);gctx.rotate(di.angle);gctx.fillStyle=`rgba(255,68,85,${alpha})`;gctx.beginPath();gctx.moveTo(15,0);gctx.lineTo(-5,-4);gctx.lineTo(-5,4);gctx.closePath();gctx.fill();gctx.restore();}
  gctx.save();gctx.globalAlpha=0.015;gctx.fillStyle='#000';for(let y=0;y<H;y+=3)gctx.fillRect(0,y,W,1);gctx.restore();
  if(player.hp>0&&player.hp<=30){const pulse=0.1+Math.sin(time*6)*0.05;gctx.fillStyle=`rgba(255,0,0,${pulse})`;gctx.fillRect(0,0,W,H);}
}

let lastTime=0;
function loop(t){if(!lastTime)lastTime=t;let dt=(t-lastTime)/1000;lastTime=t;if(dt>0.05)dt=0.05;update(dt);render();requestAnimationFrame(loop);}

document.getElementById('start-btn').onclick=()=>{startGame();AudioEngine.startBackgroundMusic();};
document.getElementById('retry-btn').onclick=()=>{startGame();AudioEngine.startBackgroundMusic();};
document.getElementById('resume-btn').onclick=togglePause;
document.getElementById('shop-next-btn').onclick=()=>{document.getElementById('shop-overlay').classList.add('hidden');state='play';startNextWave();AudioEngine.play('ui');};
document.getElementById('mute-btn').onclick=function(){AudioEngine.init();const muted=!AudioEngine.isMuted;AudioEngine.setMuted(muted);this.textContent=muted?'🔇 MUTED':'🔊 SOUND';};
resetGame();requestAnimationFrame(loop);
})();
</script>
